name: ai-bot-dev-db

services:
  postgres:
    image: ${PGVECTOR_IMAGE:-pgvector/pgvector:pg18}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_bot}
      POSTGRES_USER: ${POSTGRES_USER:-ai_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in the root .env file}
      TZ: Asia/Shanghai
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./initdb/001-enable-pgvector.sql:/docker-entrypoint-initdb.d/001-enable-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  postgres_data:
